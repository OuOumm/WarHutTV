name: "\U0001F41B Bug 反馈"
description: "提交一个 Bug 报告，帮助我们改进 WarHutTV"
title: "[Bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        感谢你提交 Bug 反馈！请尽量填写以下信息，以便我们快速定位和修复问题。

  - type: textarea
    id: description
    attributes:
      label: Bug 描述
      description: 清晰简洁地描述你遇到的问题
      placeholder: 例如：搜索某些关键词时页面白屏
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: 复现步骤
      description: 详细描述如何触发这个 Bug
      placeholder: |
        1. 进入 '...'
        2. 点击 '...'
        3. 滚动到 '...'
        4. 出现错误
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: 期望行为
      description: 描述你期望的正确行为是什么
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: 实际行为
      description: 描述实际发生了什么
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: 问题模块
      description: 这个 Bug 涉及哪个功能模块？
      options:
        - 搜索（聚合搜索）
        - 播放（视频播放）
        - 浏览（豆瓣/Bangumi）
        - 直播（电视频道）
        - 收藏/历史
        - 主题/界面
        - 登录/认证
        - 播放源测速
        - 设置
        - 其他
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: 运行环境
      description: 提供你的运行环境信息
      placeholder: |
        - WarHutTV 版本：（查看页面底部版本号）
        - 部署方式：Docker / 二进制 / 源码编译
        - 操作系统：（如 Windows 11 / Ubuntu 22.04 / macOS 14）
        - 浏览器：（如 Chrome 120 / Firefox 121 / Safari 17）
        - 设备：（如 PC / 手机 / 平板）
    validations:
      required: true

  - type: textarea
    id: config
    attributes:
      label: 配置信息
      description: |
        如果问题与视频源相关，请提供 `data/config.json` 中相关的站点配置（注意脱敏，移除密码等敏感信息）。
        如果是其他配置问题，请贴出相关配置片段。
      render: json

  - type: textarea
    id: logs
    attributes:
      label: 日志/报错信息
      description: |
        如果有浏览器控制台日志或后端日志，请贴出相关报错信息。
        打开方式：浏览器按 F12 → Console 面板
      render: text

  - type: textarea
    id: screenshots
    attributes:
      label: 截图
      description: 如果可以的话，请附上截图帮助说明问题（直接粘贴或拖拽图片）

  - type: checkboxes
    id: checklist
    attributes:
      label: 自检确认
      options:
        - label: 我已搜索过现有 Issues，确认没有重复提交
          required: true
        - label: 我已更新到最新版本，问题仍然存在
          required: false

name: "\U0001F680 功能建议"
description: "提出新功能或改进建议"
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        感谢你的功能建议！请描述你的想法，帮助我们更好地规划 WarHutTV 的发展方向。

  - type: textarea
    id: problem
    attributes:
      label: 需求背景
      description: 描述你遇到的问题或痛点，说明为什么需要这个功能
      placeholder: 例如：每次切换播放源都需要手动操作，很不方便...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: 期望方案
      description: 描述你希望实现的功能或改进方式
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 备选方案
      description: 是否有其他替代的实现方式？请一并描述

  - type: dropdown
    id: area
    attributes:
      label: 功能模块
      description: 这个建议涉及哪个功能模块？
      options:
        - 搜索（聚合搜索）
        - 播放（视频播放）
        - 浏览（豆瓣/Bangumi）
        - 收藏/历史
        - 主题/界面
        - 登录/认证
        - 播放源测速
        - 设置
        - 其他
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: 重要程度
      description: 在你看来，这个功能的重要程度如何？
      options:
        - 有就好（锦上添花）
        - 比较需要（能改善体验）
        - 非常需要（严重影响使用）
    validations:
      required: true

  - type: textarea
    id: screenshots
    attributes:
      label: 参考截图/链接
      description: 如果有参考的界面设计或其他项目实现，请附上截图或链接

  - type: checkboxes
    id: checklist
    attributes:
      label: 自检确认
      options:
        - label: 我已搜索过现有 Issues，确认没有重复建议
          required: true

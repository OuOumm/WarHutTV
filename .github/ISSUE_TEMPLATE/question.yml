name: "\U0001F4AC 问题求助 / Question"
description: "使用中遇到问题或有疑问"
title: "[Question] "
labels: ["question"]
body:
  - type: markdown
    attributes:
      value: |
        提问前请先查阅 [README](../../README.md) 和已有的 [Issues](../../issues)，也许能找到答案。

  - type: textarea
    id: question
    attributes:
      label: 问题描述
      description: 清晰描述你遇到的问题或疑问
      placeholder: 例如：如何配置多个视频源？Docker 部署后无法访问怎么办？
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: 背景信息
      description: 提供相关上下文，帮助我们更好地理解你的问题
      placeholder: |
        - WarHutTV 版本：
        - 部署方式：Docker / 二进制 / 源码编译
        - 操作系统：
        - 浏览器：
    validations:
      required: false

  - type: textarea
    id: tried
    attributes:
      label: 已尝试的方法
      description: 你已经尝试过哪些方法？结果如何？
    validations:
      required: false

  - type: dropdown
    id: area
    attributes:
      label: 相关模块
      description: 你的问题涉及哪个功能模块？
      options:
        - 部署/安装
        - 视频源配置
        - 搜索/播放
        - 主题/界面
        - 认证/安全
        - 其他
    validations:
      required: true

  - type: checkboxes
    id: checklist
    attributes:
      label: 自检确认
      options:
        - label: 我已查阅 README 和已有 Issues
          required: true

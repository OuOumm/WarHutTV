name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

jobs:
  # ─── Build binaries for all platforms ───
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            suffix: ''
            platform: linux
          - goos: linux
            goarch: arm64
            suffix: ''
            platform: linux
          - goos: windows
            goarch: amd64
            suffix: '.exe'
            platform: windows
          - goos: darwin
            goarch: amd64
            suffix: ''
            platform: mac
          - goos: darwin
            goarch: arm64
            suffix: ''
            platform: mac

    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Build Frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache-dependency-path: backend/go.sum

      - name: Build Binary
        working-directory: backend
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          mkdir -p frontend/dist
          cp -r ../frontend/dist frontend/dist
          go build -tags embed -ldflags="-s -w" -trimpath -o ../bin/warhutv-${{ matrix.platform }}-${{ matrix.goarch }}${{ matrix.suffix }} .
          rm -rf frontend

      - name: Compress with UPX
        if: matrix.goos != 'darwin'
        uses: crazy-max/ghaction-upx@v3
        with:
          version: latest
          files: |
            bin/warhutv-${{ matrix.platform }}-${{ matrix.goarch }}${{ matrix.suffix }}
          args: --best --lzma

      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: warhutv-${{ matrix.platform }}-${{ matrix.goarch }}
          path: bin/warhutv-*

  # ─── Build Docker image ───
  docker:
    needs: [build]
    runs-on: ubuntu-latest
    continue-on-error: true  # Docker push failure should not block release
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Build Frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache-dependency-path: backend/go.sum

      - name: Build Binary for Docker
        working-directory: backend
        env:
          GOOS: linux
          GOARCH: amd64
          CGO_ENABLED: 0
        run: |
          mkdir -p frontend/dist
          cp -r ../frontend/dist frontend/dist
          go build -tags embed -ldflags="-s -w" -trimpath -o ../warhutv .
          rm -rf frontend

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.release
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─── Create GitHub Release with changelog ───
  release:
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0  # full history for changelog

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Find previous tag
        id: prev
        run: |
          # Find the tag before the current one (traverse commit history)
          PREV=$(git tag --sort=-version:refname | grep -A1 "^${{ github.ref_name }}$" | tail -1)
          if [ "$PREV" = "${{ github.ref_name }}" ]; then
            PREV=""
          fi
          echo "Previous tag: ${PREV:-none}"
          echo "tag=$PREV" >> "$GITHUB_OUTPUT"

      - name: Generate changelog
        id: changelog
        run: |
          PREV="${{ steps.prev.outputs.tag }}"
          if [ -n "$PREV" ]; then
            python scripts/generate_changelog.py "$PREV" "${{ github.ref_name }}" > changelog.md
          else
            # First release — show all commits from root
            ROOT=$(git rev-list --max-parents=0 HEAD)
            python scripts/generate_changelog.py "$ROOT" "${{ github.ref_name }}" > changelog.md
          fi
          echo "--- Changelog ---"
          cat changelog.md

      - name: Download all artifacts
        uses: actions/download-artifact@v5
        with:
          path: bin

      - name: Package binaries
        run: |
          cd bin
          for dir in */; do
            name="${dir%/}"
            if [[ "$name" == *"windows"* ]]; then
              zip "${name}.zip" "${dir}"*
            else
              tar czf "${name}.tar.gz" -C "$dir" .
            fi
          done

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: changelog.md
          files: |
            bin/*.tar.gz
            bin/*.zip
          generate_release_notes: false

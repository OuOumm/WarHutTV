<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WarHutTV - 影视搜索</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    /* ==================== RESET & BASE ==================== */
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg-deep: #0b111e;
      --bg-card: #111827;
      --primary: #e6b91e;
      --primary-dim: #b8941a;
      --text-white: #f0f0f0;
      --text-muted: #8b95a5;
      --glass-bg: rgba(17, 24, 39, 0.65);
      --glass-border: rgba(230, 185, 30, 0.15);
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Inter', sans-serif;
      background-color: var(--bg-deep);
      color: var(--text-white);
      min-height: 100vh;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* ==================== BACKGROUND ATMOSPHERE ==================== */
    body::before {
      content: '';
      position: fixed;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: 
        radial-gradient(ellipse at 20% 50%, rgba(230, 185, 30, 0.04) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 20%, rgba(59, 130, 246, 0.03) 0%, transparent 50%),
        radial-gradient(ellipse at 50% 80%, rgba(139, 92, 246, 0.02) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }

    /* Film grain texture overlay */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
      opacity: 0.5;
    }

    /* ==================== LAYOUT CONTAINER ==================== */
    .app {
      position: relative;
      z-index: 1;
      max-width: 1400px;
      margin: 0 auto;
      padding: 0 2rem;
    }

    /* ==================== HEADER ==================== */
    .header {
      padding: 3rem 0 2rem;
      text-align: center;
      opacity: 0;
      transform: translateY(-40px);
      animation: slideDown 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    .header__brand {
      font-family: 'Anton', sans-serif;
      font-size: clamp(2.5rem, 5vw, 4rem);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      background: linear-gradient(135deg, var(--primary) 0%, #f5d76e 50%, var(--primary-dim) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 0.5rem;
    }

    .header__tagline {
      font-size: 0.875rem;
      color: var(--text-muted);
      letter-spacing: 0.2em;
      text-transform: uppercase;
      font-weight: 300;
    }

    /* ==================== SEARCH BAR ==================== */
    .search-container {
      position: relative;
      max-width: 600px;
      margin: 2.5rem auto 3.5rem;
      opacity: 0;
      transform: translateY(-30px);
      animation: slideDown 0.8s cubic-bezier(0.16, 1, 0.3, 1) 0.15s forwards;
    }

    .search {
      position: relative;
      z-index: 10;
    }

    .search__input {
      width: 100%;
      padding: 1rem 1.5rem 1rem 3.25rem;
      background: var(--glass-bg);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--glass-border);
      border-radius: 1rem;
      color: var(--text-white);
      font-family: 'Inter', sans-serif;
      font-size: 1rem;
      outline: none;
      transition: all 0.3s ease;
    }

    .search__input::placeholder {
      color: var(--text-muted);
      font-weight: 300;
    }

    .search__input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(230, 185, 30, 0.1), 0 8px 32px rgba(0, 0, 0, 0.3);
    }

    .search__icon {
      position: absolute;
      left: 1.125rem;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      pointer-events: none;
      transition: color 0.3s;
    }

    .search__input:focus ~ .search__icon {
      color: var(--primary);
    }

    /* ==================== SEARCH DROPDOWN ==================== */
    .search-dropdown {
      position: absolute;
      top: calc(100% + 0.5rem);
      left: 0;
      right: 0;
      background: rgba(17, 24, 39, 0.9);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid var(--glass-border);
      border-radius: 0.75rem;
      max-height: 320px;
      overflow-y: auto;
      opacity: 0;
      visibility: hidden;
      transform: translateY(-8px);
      transition: all 0.25s cubic-bezier(0.16, 1, 0.3, 1);
      z-index: 20;
    }

    .search-dropdown.active {
      opacity: 1;
      visibility: visible;
      transform: translateY(0);
    }

    .search-dropdown__item {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 0.875rem 1.25rem;
      cursor: pointer;
      transition: background 0.2s;
    }

    .search-dropdown__item:hover {
      background: rgba(230, 185, 30, 0.08);
    }

    .search-dropdown__item + .search-dropdown__item {
      border-top: 1px solid rgba(255, 255, 255, 0.05);
    }

    .search-dropdown__poster {
      width: 36px;
      height: 54px;
      border-radius: 4px;
      object-fit: cover;
      flex-shrink: 0;
      background: var(--bg-card);
    }

    .search-dropdown__info {
      flex: 1;
      min-width: 0;
    }

    .search-dropdown__title {
      font-weight: 500;
      font-size: 0.9375rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .search-dropdown__meta {
      font-size: 0.75rem;
      color: var(--text-muted);
      margin-top: 2px;
    }

    .search-dropdown__empty {
      padding: 2rem;
      text-align: center;
      color: var(--text-muted);
      font-size: 0.875rem;
    }

    /* ==================== SECTION HEADER ==================== */
    .section-header {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-bottom: 1.5rem;
    }

    .section-header__title {
      font-family: 'Anton', sans-serif;
      font-size: 1.5rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--text-white);
    }

    .section-header__line {
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, var(--glass-border) 0%, transparent 100%);
    }

    .section-header__count {
      font-size: 0.75rem;
      color: var(--text-muted);
      font-weight: 300;
      letter-spacing: 0.1em;
    }

    /* ==================== MOVIE CARDS GRID ==================== */
    .movies-scroll {
      display: flex;
      gap: 1.25rem;
      overflow-x: auto;
      padding-bottom: 2rem;
      scroll-snap-type: x mandatory;
      -ms-overflow-style: none;
      scrollbar-width: none;
    }

    .movies-scroll::-webkit-scrollbar {
      display: none;
    }

    /* ==================== MOVIE CARD ==================== */
    .movie-card {
      position: relative;
      flex: 0 0 220px;
      aspect-ratio: 2 / 3;
      border-radius: 0.75rem;
      overflow: hidden;
      cursor: pointer;
      scroll-snap-align: start;
      opacity: 0;
      transform: translateY(30px);
      transition: transform 0.35s cubic-bezier(0.16, 1, 0.3, 1), box-shadow 0.35s ease;
    }

    .movie-card.visible {
      animation: cardReveal 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    .movie-card:hover {
      transform: translateY(-12px) scale(1.03);
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(230, 185, 30, 0.2);
    }

    /* Card poster image */
    .movie-card__poster {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .movie-card:hover .movie-card__poster {
      transform: scale(1.08);
    }

    /* Gradient overlay */
    .movie-card__overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(
        to top,
        rgba(11, 17, 30, 0.95) 0%,
        rgba(11, 17, 30, 0.6) 40%,
        transparent 70%
      );
      pointer-events: none;
    }

    /* Shine sweep effect */
    .movie-card__shine {
      position: absolute;
      inset: 0;
      background: linear-gradient(
        115deg,
        transparent 30%,
        rgba(255, 255, 255, 0.08) 45%,
        rgba(255, 255, 255, 0.12) 50%,
        rgba(255, 255, 255, 0.08) 55%,
        transparent 70%
      );
      transform: translateX(-100%);
      pointer-events: none;
      z-index: 2;
    }

    .movie-card:hover .movie-card__shine {
      animation: shineSwipe 0.6s ease forwards;
    }

    /* Card info */
    .movie-card__info {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 1.25rem 1rem;
      z-index: 1;
    }

    .movie-card__title {
      font-family: 'Anton', sans-serif;
      font-size: 1.05rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      line-height: 1.2;
      margin-bottom: 0.5rem;
      color: var(--text-white);
    }

    .movie-card__meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .movie-card__year {
      font-size: 0.75rem;
      color: var(--text-muted);
      font-weight: 300;
    }

    .movie-card__rating {
      display: flex;
      align-items: center;
      gap: 0.35rem;
      font-size: 0.875rem;
      font-weight: 600;
      color: var(--primary);
    }

    .movie-card__rating-icon {
      width: 14px;
      height: 14px;
    }

    .movie-card:hover .movie-card__rating {
      animation: ratingBounce 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    /* Play overlay */
    .movie-card__play {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) scale(0);
      width: 64px;
      height: 64px;
      border-radius: 50%;
      background: rgba(230, 185, 30, 0.9);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 3;
      opacity: 0;
      transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .movie-card:hover .movie-card__play {
      opacity: 1;
      transform: translate(-50%, -50%) scale(1);
    }

    .movie-card__play-icon {
      width: 0;
      height: 0;
      border-style: solid;
      border-width: 10px 0 10px 18px;
      border-color: transparent transparent transparent var(--bg-deep);
      margin-left: 4px;
    }

    /* ==================== MODAL ==================== */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.8);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      visibility: hidden;
      transition: all 0.3s ease;
    }

    .modal-overlay.active {
      opacity: 1;
      visibility: visible;
    }

    .modal {
      width: 90%;
      max-width: 900px;
      background: var(--bg-card);
      border-radius: 1rem;
      border: 1px solid var(--glass-border);
      overflow: hidden;
      transform: scale(0.9) translateY(20px);
      transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .modal-overlay.active .modal {
      transform: scale(1) translateY(0);
    }

    .modal__player {
      position: relative;
      width: 100%;
      aspect-ratio: 16 / 9;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .modal__player-placeholder {
      text-align: center;
      color: var(--text-muted);
    }

    .modal__player-icon {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      background: var(--primary);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1rem;
      animation: pulse 2s infinite;
    }

    .modal__player-icon svg {
      width: 24px;
      height: 24px;
      margin-left: 3px;
    }

    .modal__content {
      padding: 1.5rem 2rem 2rem;
    }

    .modal__title {
      font-family: 'Anton', sans-serif;
      font-size: 1.75rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      margin-bottom: 0.5rem;
    }

    .modal__meta {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-bottom: 1rem;
      font-size: 0.875rem;
      color: var(--text-muted);
    }

    .modal__rating {
      color: var(--primary);
      font-weight: 600;
    }

    .modal__description {
      font-size: 0.9375rem;
      line-height: 1.7;
      color: var(--text-muted);
      font-weight: 300;
    }

    .modal__close {
      position: absolute;
      top: 1rem;
      right: 1rem;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: rgba(0, 0, 0, 0.5);
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: var(--text-white);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
      z-index: 10;
    }

    .modal__close:hover {
      background: rgba(230, 185, 30, 0.2);
      border-color: var(--primary);
    }

    /* ==================== EMPTY STATE ==================== */
    .empty-state {
      text-align: center;
      padding: 4rem 2rem;
      color: var(--text-muted);
    }

    .empty-state__icon {
      width: 64px;
      height: 64px;
      margin: 0 auto 1rem;
      opacity: 0.3;
    }

    .empty-state__text {
      font-size: 1rem;
      font-weight: 300;
    }

    /* ==================== FOOTER ==================== */
    .footer {
      text-align: center;
      padding: 3rem 0 2rem;
      font-size: 0.75rem;
      color: var(--text-muted);
      letter-spacing: 0.1em;
      opacity: 0;
      animation: fadeIn 1s ease 1.2s forwards;
    }

    /* ==================== ANIMATIONS ==================== */
    @keyframes slideDown {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes cardReveal {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes shineSwipe {
      to {
        transform: translateX(100%);
      }
    }

    @keyframes ratingBounce {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.2); }
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.05); opacity: 0.8; }
    }

    @keyframes fadeIn {
      to { opacity: 1; }
    }

    /* ==================== REDUCED MOTION ==================== */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
    }

    /* ==================== RESPONSIVE ==================== */
    @media (max-width: 768px) {
      .app {
        padding: 0 1rem;
      }

      .header {
        padding: 2rem 0 1.5rem;
      }

      .movie-card {
        flex: 0 0 160px;
      }

      .modal__content {
        padding: 1rem 1.25rem 1.5rem;
      }

      .modal__title {
        font-size: 1.25rem;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <!-- Header -->
    <header class="header">
      <h1 class="header__brand">WarHutTV</h1>
      <p class="header__tagline">搜索 · 发现 · 观看</p>
    </header>

    <!-- Search -->
    <div class="search-container">
      <div class="search">
        <input 
          type="text" 
          class="search__input" 
          id="searchInput"
          placeholder="搜索电影、剧集..." 
          autocomplete="off"
        >
        <svg class="search__icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"/>
          <path d="M21 21l-4.35-4.35"/>
        </svg>
      </div>
      <div class="search-dropdown" id="searchDropdown"></div>
    </div>

    <!-- Hot Movies Section -->
    <section class="section">
      <div class="section-header">
        <h2 class="section-header__title">热门推荐</h2>
        <div class="section-header__line"></div>
        <span class="section-header__count" id="movieCount">10 部影片</span>
      </div>
      <div class="movies-scroll" id="moviesScroll"></div>
    </section>

    <!-- Empty State (hidden by default) -->
    <div class="empty-state" id="emptyState" style="display: none;">
      <svg class="empty-state__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
      </svg>
      <p class="empty-state__text">没有找到匹配的影片</p>
    </div>

    <!-- Footer -->
    <footer class="footer">
      <p>© 2024 WarHutTV · 仅供学习交流使用</p>
    </footer>
  </div>

  <!-- Modal -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal">
      <button class="modal__close" id="modalClose">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="18" y1="6" x2="6" y2="18"/>
          <line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
      <div class="modal__player">
        <div class="modal__player-placeholder">
          <div class="modal__player-icon">
            <svg viewBox="0 0 24 24" fill="var(--bg-deep)">
              <polygon points="5 3 19 12 5 21 5 3"/>
            </svg>
          </div>
          <p>模拟播放器</p>
        </div>
      </div>
      <div class="modal__content">
        <h3 class="modal__title" id="modalTitle"></h3>
        <div class="modal__meta">
          <span class="modal__rating" id="modalRating"></span>
          <span id="modalYear"></span>
        </div>
        <p class="modal__description" id="modalDescription"></p>
      </div>
    </div>
  </div>

        description: "安史之乱后，整个长安城陷入危局。高适回忆起自己与李白的往事，从繁华的长安到边塞的风雪，一段跨越数十年的友情与理想在诗篇中永存。",
        poster: "https://picsum.photos/seed/movie7/440/660"
      },
      {
        id: 8,
        title: "八角笼中",
        rating: 7.4,
        year: 2023,
        description: "向腾辉倾注心血想把当地无人照顾的孩子培养成才，这让生活本没有出路的孩子们看到了一丝通向未来的曙光。然而，随着往日的表演视频被爆出，舆论开始发酵。",
        poster: "https://picsum.photos/seed/movie8/440/660"
      },
      {
        id: 9,
        title: "热烈",
        rating: 7.3,
        year: 2023,
        description: "街舞老炮儿丁雷偶遇卖艺少年陈烁，丁雷忽悠陈烁加入自己经营的舞团。舞团内高手如云，性格各异，与陈烁碰撞出不同的火花，笑料不断。",
        poster: "https://picsum.photos/seed/movie9/440/660"
      },
      {
        id: 10,
        title: "前任4：英年早婚",
        rating: 6.8,
        year: 2023,
        description: "孟云和余飞这对难兄难弟，在历经情场的洗礼之后，终于来到了谈婚论嫁的年纪。面对家人的催促和内心的纠结，他们开始重新审视爱情与婚姻的意义。",
        poster: "https://picsum.photos/seed/movie10/440/660"
      }
    ];

    // ==================== DOM ELEMENTS ====================
    const searchInput = document.getElementById('searchInput');
    const searchDropdown = document.getElementById('searchDropdown');
    const moviesScroll = document.getElementById('moviesScroll');
    const movieCount = document.getElementById('movieCount');
    const emptyState = document.getElementById('emptyState');
    const modalOverlay = document.getElementById('modalOverlay');
    const modalClose = document.getElementById('modalClose');
    const modalTitle = document.getElementById('modalTitle');
    const modalRating = document.getElementById('modalRating');
    const modalYear = document.getElementById('modalYear');
    const modalDescription = document.getElementById('modalDescription');

    // ==================== RENDER FUNCTIONS ====================
    function createMovieCard(movie, index) {
      const card = document.createElement('div');
      card.className = 'movie-card';
      card.style.animationDelay = `${index * 50}ms`;
      card.innerHTML = `
        <img class="movie-card__poster" src="${movie.poster}" alt="${movie.title}" loading="lazy">
        <div class="movie-card__overlay"></div>
        <div class="movie-card__shine"></div>
        <div class="movie-card__info">
          <h3 class="movie-card__title">${movie.title}</h3>
          <div class="movie-card__meta">
            <span class="movie-card__year">${movie.year}</span>
            <span class="movie-card__rating">
              <svg class="movie-card__rating-icon" viewBox="0 0 24 24" fill="currentColor">
                <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
              </svg>
              ${movie.rating}
            </span>
          </div>
        </div>
        <div class="movie-card__play">
          <div class="movie-card__play-icon"></div>
        </div>
      `;

      card.addEventListener('click', () => openModal(movie));
      return card;
    }

    function renderMovies(movieList) {
      moviesScroll.innerHTML = '';
      
      if (movieList.length === 0) {
        emptyState.style.display = 'block';
        moviesScroll.style.display = 'none';
        movieCount.textContent = '0 部影片';
        return;
      }

      emptyState.style.display = 'none';
      moviesScroll.style.display = 'flex';
      movieCount.textContent = `${movieList.length} 部影片`;

      movieList.forEach((movie, index) => {
        const card = createMovieCard(movie, index);
        moviesScroll.appendChild(card);
        
        // Trigger entrance animation
        requestAnimationFrame(() => {
          setTimeout(() => {
            card.classList.add('visible');
          }, index * 50);
        });
      });
    }

    function renderDropdown(movieList) {
      if (movieList.length === 0) {
        searchDropdown.innerHTML = '<div class="search-dropdown__empty">没有找到匹配的影片</div>';
        searchDropdown.classList.add('active');
        return;
      }

      searchDropdown.innerHTML = movieList.slice(0, 5).map(movie => `
        <div class="search-dropdown__item" data-id="${movie.id}">
          <img class="search-dropdown__poster" src="${movie.poster}" alt="${movie.title}">
          <div class="search-dropdown__info">
            <div class="search-dropdown__title">${movie.title}</div>
            <div class="search-dropdown__meta">${movie.year} · ⭐ ${movie.rating}</div>
          </div>
        </div>
      `).join('');

      searchDropdown.classList.add('active');

      // Add click handlers to dropdown items
      searchDropdown.querySelectorAll('.search-dropdown__item').forEach(item => {
        item.addEventListener('click', () => {
          const movieId = parseInt(item.dataset.id);
          const movie = movies.find(m => m.id === movieId);
          if (movie) openModal(movie);
          searchDropdown.classList.remove('active');
          searchInput.value = '';
        });
      });
    }

    // ==================== SEARCH LOGIC ====================
    let searchTimeout;

    searchInput.addEventListener('input', (e) => {
      clearTimeout(searchTimeout);
      const query = e.target.value.trim().toLowerCase();

      if (!query) {
        searchDropdown.classList.remove('active');
        renderMovies(movies);
        return;
      }

      searchTimeout = setTimeout(() => {
        const filtered = movies.filter(movie => 
          movie.title.toLowerCase().includes(query) ||
          movie.description.toLowerCase().includes(query) ||
          String(movie.year).includes(query)
        );
        renderDropdown(filtered);
      }, 200);
    });

    searchInput.addEventListener('focus', () => {
      const query = searchInput.value.trim().toLowerCase();
      if (query) {
        const filtered = movies.filter(movie => 
          movie.title.toLowerCase().includes(query) ||
          movie.description.toLowerCase().includes(query)
        );
        renderDropdown(filtered);
      }
    });

    // Close dropdown when clicking outside
    document.addEventListener('click', (e) => {
      if (!e.target.closest('.search-container')) {
        searchDropdown.classList.remove('active');
      }
    });

    // ==================== MODAL LOGIC ====================
    function openModal(movie) {
      modalTitle.textContent = movie.title;
      modalRating.textContent = `⭐ ${movie.rating}`;
      modalYear.textContent = movie.year;
      modalDescription.textContent = movie.description;
      modalOverlay.classList.add('active');
      document.body.style.overflow = 'hidden';
    }

    function closeModal() {
      modalOverlay.classList.remove('active');
      document.body.style.overflow = '';
    }

    modalClose.addEventListener('click', closeModal);
    modalOverlay.addEventListener('click', (e) => {
      if (e.target === modalOverlay) closeModal();
    });

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') closeModal();
    });

    // ==================== INIT ====================
    renderMovies(movies);
  </script>
</body>
</html>
